services:
  postgres:
    image: postgres:16-alpine
    container_name: content-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker
      POSTGRES_DB: content_tracker
    ports:
      - "5432:5432"
    volumes:
      - tracker_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d content_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tracker_pgdata:
